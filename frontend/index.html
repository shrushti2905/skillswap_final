<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#f5f3ff',
                100: '#ede9fe',
                200: '#ddd6fe',
                300: '#c4b5fd',
                400: '#a78bfa',
                500: '#8b5cf6',
                600: '#7c3aed',
                700: '#6d28d9',
                800: '#5b21b6',
                900: '#4c1d95'
              }
            }
          }
        }
      }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      .container {max-width:1200px;margin:0 auto;padding:0 1rem}
      .bg-space {background-color:#0b1220;background-image:radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,.15) 0, rgba(255,255,255,0) 100%), radial-gradient(1px 1px at 40px 60px, rgba(255,255,255,.1) 0, rgba(255,255,255,0) 100%), radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,.08) 0, rgba(255,255,255,0) 100%), radial-gradient(1px 1px at 90px 120px, rgba(255,255,255,.08) 0, rgba(255,255,255,0) 100%), radial-gradient(600px 400px at 50% 10%, rgba(124,58,237,.15) 0, rgba(124,58,237,0) 70%)}
      .glass {backdrop-filter:saturate(160%) blur(6px)}
      
      /* Smooth transitions */
      * {transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;}
      
      /* Animations */
      @keyframes fadeIn {
        from {opacity: 0; transform: translateY(10px);}
        to {opacity: 1; transform: translateY(0);}
      }
      @keyframes slideInFromRight {
        from {transform: translateX(100%); opacity: 0;}
        to {transform: translateX(0); opacity: 1;}
      }
      @keyframes slideInFromTop {
        from {transform: translateY(-20px); opacity: 0;}
        to {transform: translateY(0); opacity: 1;}
      }
      @keyframes scaleIn {
        from {transform: scale(0.95); opacity: 0;}
        to {transform: scale(1); opacity: 1;}
      }
      @keyframes pulse {
        0%, 100% {opacity: 1;}
        50% {opacity: 0.5;}
      }
      @keyframes spin {
        to {transform: rotate(360deg);}
      }
      @keyframes bellRing {
        0%, 100% {transform: rotate(0deg);}
        10%, 30% {transform: rotate(-10deg);}
        20%, 40% {transform: rotate(10deg);}
      }
      @keyframes typingDots {
        0%, 60%, 100% {opacity: 0.3;}
        30% {opacity: 1;}
      }
      @keyframes shimmer {
        0% {background-position: -1000px 0;}
        100% {background-position: 1000px 0;}
      }
      @keyframes progressFill {
        from {width: 0;}
      }
      @keyframes toastSlideIn {
        from {transform: translateX(400px); opacity: 0;}
        to {transform: translateX(0); opacity: 1;}
      }
      @keyframes toastSlideOut {
        from {transform: translateX(0); opacity: 1;}
        to {transform: translateX(400px); opacity: 0;}
      }
      
      .animate-fadeIn {animation: fadeIn 0.4s ease-out forwards;}
      .animate-slideInRight {animation: slideInFromRight 0.3s ease-out;}
      .animate-slideInTop {animation: slideInFromTop 0.3s ease-out;}
      .animate-scaleIn {animation: scaleIn 0.2s ease-out;}
      .animate-pulse-slow {animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;}
      
      /* Modal positioning fix */
      .modal-overlay {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        z-index: 9999 !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        padding: 1rem !important;
        overflow-y: auto !important;
      }
      .modal-content {
        position: relative !important;
        z-index: 10000 !important;
        max-height: 90vh !important;
        overflow-y: auto !important;
        margin: auto !important;
      }
      .modal-backdrop {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        z-index: 9998 !important;
      }
      
      /* Ensure no parent transforms break fixed positioning */
      #modal-root {
        position: relative;
        z-index: 9999;
      }
      .animate-spin {animation: spin 1s linear infinite;}
      .animate-bellRing {animation: bellRing 0.5s ease-in-out;}
      .animate-shimmer {
        background: linear-gradient(90deg, #1e293b 0%, #334155 50%, #1e293b 100%);
        background-size: 1000px 100%;
        animation: shimmer 2s infinite;
      }
      .animate-progressFill {animation: progressFill 1s ease-out forwards;}
      .animate-toastIn {animation: toastSlideIn 0.3s ease-out forwards;}
      .animate-toastOut {animation: toastSlideOut 0.3s ease-in forwards;}
      
      /* Hover effects */
      .hover-lift {transition: transform 0.2s ease, box-shadow 0.2s ease;}
      .hover-lift:hover {transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);}
      
      /* Button ripple effect */
      .btn-ripple {position: relative; overflow: hidden;}
      .btn-ripple::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
      }
      .btn-ripple:active::after {
        width: 300px;
        height: 300px;
      }
      
      /* Smooth scroll */
      html {scroll-behavior: smooth;}
      
      /* Focus states */
      button:focus, a:focus, input:focus, textarea:focus, select:focus {
        outline: 2px solid #8b5cf6;
        outline-offset: 2px;
      }
      
      /* Typing indicator */
      .typing-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #94a3b8;
        animation: typingDots 1.4s infinite;
      }
      .typing-dot:nth-child(2) {animation-delay: 0.2s;}
      .typing-dot:nth-child(3) {animation-delay: 0.4s;}
    </style>
</head>
<body class="bg-[#0b1220] min-h-screen text-slate-100">
    <div id="root" class="min-h-screen"></div>
    <div id="modal-root"></div>
    
    <!-- API Client -->
    <script src="js/api-client.js?v=3"></script>
    
    <!-- React Components -->
    <script type="text/babel" src="js/components.js?v=3"></script>
    
    <!-- Requests Page Component -->
    <script type="text/babel" src="js/requests-page.js?v=3"></script>
    
    <!-- React App -->
    <script type="text/babel" src="js/app.js?v=3"></script>
</body>
</html>
