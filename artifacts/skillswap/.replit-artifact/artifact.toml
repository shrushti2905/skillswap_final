kind = "web"
previewPath = "/"
title = "SkillSwap Platform"
version = "1.0.0"
id = "artifacts/skillswap"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21899

[services.development]
run = "pnpm --filter @workspace/skillswap run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skillswap", "run", "build" ]
publicDir = "artifacts/skillswap/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21899"
BASE_PATH = "/"
